apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: teachua
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 441955873558.dkr.ecr.eu-north-1.amazonaws.com/teachua-dev-frontend:3c08eb9
          ports:
            - containerPort: 80