
services:

  db:
    image: mysql:8.0
    container_name: teachua-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: teachua
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../../backend-Pavlobuch/data.sql:/docker-entrypoint-initdb.d/data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ../../backend-Pavlobuch
      dockerfile: Dockerfile
    container_name: teachua-backend
    environment:
      JDBC_DRIVER: com.mysql.cj.jdbc.Driver
      DATASOURCE_URL: jdbc:mysql://db:3306/teachua?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DATASOURCE_USER: ${MYSQL_USER}
      DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend-Pavlobuch
      dockerfile: Dockerfile
      args:
        REACT_APP_ROOT_SERVER: ${REACT_APP_ROOT_SERVER:-http://localhost:8080}
    container_name: teachua-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
