---
- name: Check if k3s binary is present
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Create k3s temporary directory
  ansible.builtin.file:
    path: /tmp/k3s
    state: directory
    mode: "0755"
  become: true
  when: not k3s_binary.stat.exists

- name: Download k3s
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s/k3s_install.sh
    mode: '0700'
  become: true
  when: not k3s_binary.stat.exists

- name: Install k3s
  ansible.builtin.command: sh /tmp/k3s/k3s_install.sh
  become: true
  when: not k3s_binary.stat.exists
  changed_when: true

- name: Ensure k3s service is enabled and running
  ansible.builtin.service:
    name: "{{ k3s_service_name }}"
    enabled: true
    state: started
  become: true

- name: Create .kube directory for ubuntu user
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0700'

- name: Copy k3s kube config for ubuntu user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: '0600'
  become: true

- name: set KUBECONFIG variable for ubuntu user
  ansible.builtin.lineinfile:
    path: /home/ubuntu/.bashrc
    line: 'export KUBECONFIG=/home/ubuntu/.kube/config'
    state: present

- name: Check k3s version
  ansible.builtin.command: k3s --version
  register: k3s_version
  changed_when: false

- name: Show k3s version
  ansible.builtin.debug:
    var: k3s_version.stdout_lines

- name: Check kubectl nodes
  ansible.builtin.command: kubectl get nodes
  register: k3s_nodes
  changed_when: false

- name: Show kubectl nodes
  ansible.builtin.debug:
    var: k3s_nodes.stdout_lines

- name: Assert Kubernetes nodes are ready
  ansible.builtin.assert:
    that:
      - "' Ready ' in k3s_nodes.stdout"
    fail_msg: "K3s node is not ready"
    success_msg: "K3s node is ready"
