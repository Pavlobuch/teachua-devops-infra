---
- name: Check if k3s binary is present
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Create k3s temporary directory
  ansible.builtin.file:
    path: /tmp/k3s
    state: directory
    mode: "0755"
  become: true
  when: not k3s_binary.stats.exists

- name: Download k3s
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s/k3s_install.sh
    mode: '0700'
  become: true
  when: not k3s_binary.stat.exists

- name: Install k3s
  ansible.builtin.command: sh /tmp/k3s/k3s_install.sh
  become: true
  when: not k3s_binary.stat.exists
  changed_when: true

- name: Ensure k3s service is enabled and running
  ansible.builtin.service:
    name: "{{ k3s_service_name }}"
    enabled: true
    state: started
  become: true

- name: Check k3s version
  ansible.builtin.command: k3s --version
  register: k3s_version
  changed_when: false

- name: Show k3s version
  ansible.builtin.debug:
    var: k3s_version.stdout_lines

- name: Check kubectl nodes
  ansible.builtin.command: kubectl get nodes
  register: k3s_nodes
  changed_when: false

- name: Show kubectl nodes
  ansible.builtin.debug:
    var: k3s_nodes.stdout_lines

- name: Assert Kubernetes nodes are ready
  ansible.builtin.assert:
    that:
      - "' Ready ' in k3s_nodes.stdout"
    fail_msg: "K3s node is not ready"
    success_msg: "K3s node is ready"
