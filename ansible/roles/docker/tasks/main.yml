---
- name: Install Docker prerequisite packages
  ansible.builtin.apt:
    name: "{{ docker_prerequisite_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Create Docker apt keyring directory
  ansible.builtin.file:
    path: "{{ docker_keyring_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Download Docker official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: "{{ docker_gpg_key }}"
    mode: "0644"
  become: true

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} signed-by={{ docker_gpg_key }}]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: true
  become: true

- name: Install docker packages
  ansible.builtin.package:
    name: "{{ docker_packages }}"
    state: present
  become: true

- name: Ensure Docker service is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true

- name: Add user to the docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"
  become: true

- name: Validate Docker version
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false

- name: Validate docker compose version
  ansible.builtin.command: docker compose version
  register: docker_compose_version
  changed_when: false

- name: Show Docker validation output
  ansible.builtin.debug:
    msg:
      - "{{ docker_version.stdout }}"
      - "{{ docker_compose_version.stdout }}"
